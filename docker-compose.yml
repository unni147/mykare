version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5473:5473"
    environment:
      - NODE_ENV=production
      - PORT=5473

# Notes:
# - Place this file at the repository root so `context: ./backend` and `context: ./frontend`
#   reference the `backend` and `frontend` folders correctly.